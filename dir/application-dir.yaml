apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-arogcd-1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pathanbashakhan/ArgoCD.git'
    targetRevision: main
    path: 'my-static-manifests'   # 🌟 Points directly to your new folder
    directory:
      recurse: true                # Activates the Directory Builder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default             # Deploys the pods into the default namespace
    